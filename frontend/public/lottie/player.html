<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lottie</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    #dotlottie-canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="dotlottie-canvas"></canvas>
  <script type="module">
    (function () {
      const params = new URLSearchParams(window.location.search);
      const useContainer = params.get('fill') === '1' || params.get('fill') === 'true';
      let w = parseInt(params.get('w') || '0', 10) || 0;
      let h = parseInt(params.get('h') || '0', 10) || 0;
      if (useContainer || (w <= 0 || h <= 0)) {
        w = document.documentElement.clientWidth || 90;
        h = document.documentElement.clientHeight || 90;
      } else {
        w = Math.min(512, w);
        h = Math.min(512, h);
      }
      const src = params.get('src') || '/lottie/Lipstick.lottie';
      const speed = Math.max(0.25, Math.min(2, parseFloat(params.get('speed') || '1') || 1));
      const canvas = document.getElementById('dotlottie-canvas');
      canvas.width = w;
      canvas.height = h;
      function resize() {
        if (!useContainer && w > 0 && h > 0) return;
        const cw = document.documentElement.clientWidth || w;
        const ch = document.documentElement.clientHeight || h;
        if (canvas.width !== cw || canvas.height !== ch) {
          canvas.width = cw;
          canvas.height = ch;
          if (window.__dotlottie) window.__dotlottie.resize({ width: cw, height: ch });
        }
      }
      window.addEventListener('resize', resize);
      import('https://cdn.jsdelivr.net/npm/@lottiefiles/dotlottie-web/+esm').then(function (m) {
        const dotlottie = new m.DotLottie({ autoplay: true, loop: true, speed: speed, canvas: canvas, src: src });
        window.__dotlottie = dotlottie;
      }).catch(function () {});
    })();
  </script>
</body>
</html>
