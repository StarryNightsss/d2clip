<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lottie</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      position: relative;
    }
    /* 旋转 90°：动画 80×400 → 400×80。条带 = 填满 iframe 宽 × 高 */
    .lottie-rotate {
      width: 100vh;
      height: 100vw;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) rotate(90deg);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    /* 旋转后 = 100% 宽 × iframe 高(100vh)，不再用 20vw 避免为 0 或错位 */
    .lottie-inner {
      width: 100vh;
      height: 100%;
      flex-shrink: 0;
      min-width: 60px;
      min-height: 200px;
    }
    .lottie-inner dotlottie-player {
      width: 100% !important;
      height: 100% !important;
      min-width: 60px;
      min-height: 60px;
      display: block;
    }
  </style>
</head>
<body>
  <div class="lottie-rotate">
    <div class="lottie-inner">
      <dotlottie-player
        src="/animations/Kiss.lottie"
        loop
        autoplay
        mode="normal"
      ></dotlottie-player>
    </div>
  </div>
  <script type="module" src="https://unpkg.com/@dotlottie/player-component@2.3.0/dist/dotlottie-player.mjs"></script>
</body>
</html>
